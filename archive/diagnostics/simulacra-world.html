<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>시뮬라크월드</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10151d;
      --panel: #171e29;
      --panel-soft: #1d2633;
      --line: #344154;
      --text: #f6f8fc;
      --muted: #aebbd0;
      --green: #6ee7a0;
      --cyan: #61d4ec;
      --gold: #f5c867;
      --danger: #ff7d98;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, a {
      font: inherit;
    }

    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1;
      letter-spacing: 0;
    }

    .topbar p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .pill {
      border: 1px solid rgba(110, 231, 160, 0.5);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--green);
      background: rgba(110, 231, 160, 0.08);
      white-space: nowrap;
      font-weight: 800;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(280px, 0.8fr);
      gap: 14px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-header strong {
      font-size: 18px;
    }

    .panel-header span {
      color: var(--muted);
      font-size: 13px;
    }

    .game-list {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .game-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
    }

    .game-card h2 {
      margin: 0;
      font-size: 19px;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .tag {
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
      font-size: 12px;
      font-weight: 750;
    }

    .tag.ready { color: var(--green); border-color: rgba(110, 231, 160, 0.5); }
    .tag.candidate { color: var(--cyan); border-color: rgba(97, 212, 236, 0.5); }
    .tag.reference { color: var(--gold); border-color: rgba(245, 200, 103, 0.5); }

    .launch {
      min-width: 108px;
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      background: var(--green);
      color: #09120e;
      font-weight: 900;
      cursor: pointer;
    }

    .launch[disabled] {
      background: #2a3342;
      color: #7f8da3;
      cursor: not-allowed;
    }

    .module-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 14px;
    }

    .module {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 13px;
      font-weight: 760;
      word-break: keep-all;
    }

    .summary {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(52, 65, 84, 0.7);
      color: var(--muted);
      font-weight: 760;
    }

    .summary-row:last-child { border-bottom: 0; }
    .summary-row b { color: var(--text); }

    .warning {
      margin: 14px;
      border: 1px solid rgba(255, 125, 152, 0.45);
      border-radius: 8px;
      padding: 12px;
      color: #ffd9e1;
      background: rgba(255, 125, 152, 0.08);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      .shell { padding: 14px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      .game-card { grid-template-columns: 1fr; }
      .launch { width: 100%; }
      .module-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>시뮬라크월드</h1>
        <p>공통 엔진 등록 상태</p>
      </div>
      <div class="pill" id="shell-mode">진단</div>
    </header>

    <section class="grid" aria-label="시뮬라크월드 등록 상태">
      <div class="panel">
        <div class="panel-header">
          <div>
            <strong>파생 게임</strong>
            <span id="game-count"></span>
          </div>
        </div>
        <div class="game-list" id="game-list" data-game-list></div>
      </div>

      <aside class="panel">
        <div class="panel-header">
          <div>
            <strong>공통 모듈</strong>
            <span id="module-count"></span>
          </div>
        </div>
        <div class="module-list" id="module-list"></div>
        <div class="summary" id="summary-list"></div>
        <div class="warning">후보와 참고 항목은 실행되지 않습니다. 먼저 공통 계약을 통과해야 합니다.</div>
      </aside>
    </section>
  </main>

  <script type="module">
    import {
      createSimulacraWorldShellSnapshot,
      createSimulacraWorldGameLaunch
    } from "../../src/restored/engine/simulacra-world-shell.js";

    const snapshot = createSimulacraWorldShellSnapshot();
    const gameList = document.getElementById("game-list");
    const moduleList = document.getElementById("module-list");
    const summaryList = document.getElementById("summary-list");

    document.getElementById("shell-mode").textContent = snapshot.mode === "registry-diagnostic" ? "진단" : snapshot.mode;
    document.getElementById("game-count").textContent = `${snapshot.games.length}개 등록`;
    document.getElementById("module-count").textContent = `${snapshot.commonModules.length}개`;

    for (const game of snapshot.games) {
      const launch = createSimulacraWorldGameLaunch(game.gameId);
      const card = document.createElement("article");
      card.className = "game-card";
      card.dataset.gameId = game.gameId;

      const info = document.createElement("div");
      const title = document.createElement("h2");
      title.textContent = game.koreanTitle || game.title;
      const meta = document.createElement("div");
      meta.className = "meta";
      for (const label of [game.statusLabel, game.role, ...game.commonModules.slice(0, 3)]) {
        const tag = document.createElement("span");
        tag.className = `tag ${game.statusLabel}`;
        tag.textContent = label;
        meta.append(tag);
      }
      info.append(title, meta);

      const button = document.createElement("button");
      button.className = "launch";
      button.type = "button";
      button.textContent = launch.ok ? "열기" : "잠김";
      button.disabled = !launch.ok;
      if (launch.ok) {
        button.addEventListener("click", () => {
          const href = /^(https?:)?\/\//.test(launch.href) ? launch.href : `../../${launch.href.replace(/^\.\//, "")}`;
          window.location.href = href;
        });
      }

      card.append(info, button);
      gameList.append(card);
    }

    for (const module of snapshot.commonModules) {
      const item = document.createElement("div");
      item.className = "module";
      item.textContent = module.label;
      moduleList.append(item);
    }

    for (const row of [
      ["실행 가능", snapshot.launchableGameIds.length],
      ["후보", snapshot.candidateGameIds.length],
      ["운영 참고", snapshot.referenceGameIds.length]
    ]) {
      const item = document.createElement("div");
      item.className = "summary-row";
      item.innerHTML = `<span>${row[0]}</span><b>${row[1]}</b>`;
      summaryList.append(item);
    }
  </script>
</body>
</html>
