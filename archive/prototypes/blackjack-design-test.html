<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>블랙잭 디자인 테스트</title>
  <style>
    :root {
      --felt: #126244;
      --felt-deep: #083629;
      --felt-light: #1f8b62;
      --ink: #101318;
      --panel: #f8f3e7;
      --panel-dark: #231a16;
      --brass: #d7a83f;
      --ruby: #a42d3a;
      --sky: #4f8fd8;
      --white: #fffaf0;
      --muted: #7a7163;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--white);
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 18px),
        linear-gradient(135deg, #0d1b1a 0%, #0f2f26 42%, #2a1516 100%);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      padding: 18px;
    }

    .table {
      position: relative;
      min-height: calc(100vh - 36px);
      border: 10px solid #4b2d1b;
      border-radius: 32px;
      box-shadow: var(--shadow), inset 0 0 0 2px rgba(255,255,255,0.14);
      background:
        radial-gradient(ellipse at center, rgba(255,255,255,0.1), transparent 60%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.035) 0 2px, transparent 2px 12px),
        linear-gradient(160deg, var(--felt-light), var(--felt) 45%, var(--felt-deep));
      padding: 22px;
      overflow: hidden;
    }

    .table::before {
      content: "블랙잭";
      position: absolute;
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 112px;
      font-weight: 950;
      letter-spacing: 0;
      color: rgba(255, 250, 240, 0.06);
      pointer-events: none;
      white-space: nowrap;
    }

    .topbar {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      min-height: 72px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      background: rgba(10, 18, 17, 0.5);
      backdrop-filter: blur(8px);
    }

    .stat small {
      display: block;
      color: rgba(255,255,255,0.62);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 24px;
      line-height: 1;
      color: var(--brass);
    }

    .arena {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: calc(100vh - 178px);
      gap: 16px;
      padding-top: 18px;
    }

    .hand-zone {
      min-height: 172px;
      display: grid;
      align-content: center;
      gap: 12px;
    }

    .hand-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: rgba(255,255,255,0.82);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .score-pill {
      min-width: 46px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.36);
      color: var(--brass);
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      min-height: 104px;
      flex-wrap: wrap;
    }

    .card {
      width: 78px;
      aspect-ratio: 5 / 7;
      border-radius: 12px;
      background: linear-gradient(145deg, #fffdf6, #e9dfcd);
      color: #121316;
      box-shadow: 0 12px 22px rgba(0,0,0,0.22);
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 8px;
      border: 1px solid rgba(0,0,0,0.18);
      animation: cardIn 190ms ease-out both;
    }

    .card.red {
      color: var(--ruby);
    }

    .card.back {
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.16) 0 4px, transparent 4px 8px),
        linear-gradient(135deg, #244aa0, #172755);
      color: rgba(255,255,255,0.85);
      place-items: center;
      font-weight: 950;
    }

    .card .rank {
      font-size: 20px;
      font-weight: 950;
      line-height: 1;
    }

    .card .suit {
      align-self: center;
      justify-self: center;
      font-size: 36px;
    }

    .card .mini {
      justify-self: end;
      transform: rotate(180deg);
    }

    .center-callout {
      align-self: center;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: stretch;
    }

    .message {
      min-height: 92px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(8, 15, 14, 0.58);
      box-shadow: inset 0 0 42px rgba(0,0,0,0.18);
    }

    .message h1 {
      margin: 0;
      font-size: 36px;
      line-height: 1;
      letter-spacing: 0;
    }

    .message p {
      margin: 8px 0 0;
      color: rgba(255,255,255,0.72);
      font-weight: 700;
      line-height: 1.45;
    }

    .dealer-tell {
      width: 156px;
      padding: 16px;
      border-radius: 18px;
      color: var(--ink);
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(0,0,0,0.26);
    }

    .dealer-tell small {
      color: var(--muted);
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 0;
    }

    .dealer-tell strong {
      display: block;
      margin-top: 8px;
      font-size: 16px;
      line-height: 1.18;
    }

    .bet-zone {
      grid-column: 1 / -1;
      min-height: 96px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px dashed rgba(255,255,255,0.24);
      background: rgba(3, 15, 12, 0.24);
      box-shadow: inset 0 0 34px rgba(0,0,0,0.18);
    }

    .bet-stack {
      position: relative;
      min-width: 280px;
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bet-placeholder {
      color: rgba(255,255,255,0.56);
      font-size: 13px;
      font-weight: 900;
    }

    .stack-chip {
      position: absolute;
      width: 58px;
      height: 58px;
      transform:
        translateX(calc((var(--stack-index) - var(--stack-center)) * 18px))
        translateY(calc(var(--stack-lift) * -4px))
        rotate(var(--stack-tilt));
      animation: stackLand 180ms ease-out both;
      pointer-events: none;
    }

    .controls {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .action {
      min-height: 58px;
      border: 0;
      border-radius: 14px;
      color: white;
      font-weight: 950;
      letter-spacing: 0;
      box-shadow: 0 12px 22px rgba(0,0,0,0.24);
      transition: transform 120ms ease, filter 120ms ease;
    }

    .action:active {
      transform: translateY(2px);
    }

    .action.primary {
      background: linear-gradient(135deg, var(--brass), #f2d978);
      color: #18140c;
    }

    .action.blue {
      background: linear-gradient(135deg, var(--sky), #255ea5);
    }

    .action.red {
      background: linear-gradient(135deg, #d94e5c, #8c1f2c);
    }

    .action.green {
      background: linear-gradient(135deg, #49d18f, #10794f);
      color: #06140f;
    }

    .rail {
      border-radius: 24px;
      background: rgba(255, 250, 240, 0.94);
      color: var(--ink);
      padding: 18px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: #ece3d2;
      color: #5b4930;
      font-size: 12px;
      font-weight: 900;
    }

    .chips {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      justify-items: center;
    }

    .chip,
    .chip-ghost,
    .stack-chip {
      border: 0;
      border-radius: 50%;
      color: #fff8d8;
      font-weight: 950;
      letter-spacing: 0;
      display: grid;
      place-items: center;
      text-shadow: 0 1px 2px rgba(0,0,0,0.42);
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,0.18),
        inset 0 0 0 10px rgba(0,0,0,0.12),
        inset 0 -8px 14px rgba(0,0,0,0.22),
        0 10px 18px rgba(0,0,0,0.24);
    }

    .chip {
      position: relative;
      width: 124px;
      max-width: 100%;
      aspect-ratio: 1;
      min-height: 0;
      transition: transform 130ms ease, box-shadow 130ms ease;
    }

    .chip:hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,0.2),
        inset 0 0 0 10px rgba(0,0,0,0.12),
        inset 0 -8px 14px rgba(0,0,0,0.22),
        0 15px 24px rgba(0,0,0,0.28);
    }

    .chip::before,
    .chip-ghost::before,
    .stack-chip::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.58);
      background:
        radial-gradient(circle, rgba(255,255,255,0.2) 0 24%, transparent 25%),
        conic-gradient(from 10deg, rgba(255,255,255,0.86) 0 8%, transparent 8% 17%, rgba(255,255,255,0.86) 17% 25%, transparent 25% 34%, rgba(255,255,255,0.86) 34% 42%, transparent 42% 51%, rgba(255,255,255,0.86) 51% 59%, transparent 59% 68%, rgba(255,255,255,0.86) 68% 76%, transparent 76% 85%, rgba(255,255,255,0.86) 85% 93%, transparent 93%);
      pointer-events: none;
    }

    .chip span,
    .chip-ghost span,
    .stack-chip span {
      position: relative;
      z-index: 1;
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.28);
      font-size: 13px;
    }

    .chip-100 { background: conic-gradient(#8f2432 0 12%, #f8df86 12% 19%, #8f2432 19% 31%, #f8df86 31% 38%, #8f2432 38% 50%, #f8df86 50% 57%, #8f2432 57% 69%, #f8df86 69% 76%, #8f2432 76% 88%, #f8df86 88% 95%, #8f2432 95%); }
    .chip-500 { background: conic-gradient(#11613f 0 12%, #f8df86 12% 19%, #11613f 19% 31%, #f8df86 31% 38%, #11613f 38% 50%, #f8df86 50% 57%, #11613f 57% 69%, #f8df86 69% 76%, #11613f 76% 88%, #f8df86 88% 95%, #11613f 95%); }
    .chip-1000 { background: conic-gradient(#224e9d 0 12%, #f8df86 12% 19%, #224e9d 19% 31%, #f8df86 31% 38%, #224e9d 38% 50%, #f8df86 50% 57%, #224e9d 57% 69%, #f8df86 69% 76%, #224e9d 76% 88%, #f8df86 88% 95%, #224e9d 95%); }
    .chip-5000 { background: conic-gradient(#292321 0 12%, #f8df86 12% 19%, #292321 19% 31%, #f8df86 31% 38%, #292321 38% 50%, #f8df86 50% 57%, #292321 57% 69%, #f8df86 69% 76%, #292321 76% 88%, #f8df86 88% 95%, #292321 95%); }

    .chip-ghost {
      position: fixed;
      z-index: 200;
      width: 58px;
      height: 58px;
      pointer-events: none;
      animation: chipFly 520ms cubic-bezier(.18,.84,.28,1) forwards;
    }

    .bet-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .soft-button {
      min-height: 44px;
      border: 1px solid #ddd0ba;
      border-radius: 12px;
      background: #fffaf0;
      color: var(--ink);
      font-weight: 900;
    }

    .ledger {
      display: grid;
      gap: 8px;
      padding: 0;
      margin: 0;
      list-style: none;
      max-height: 210px;
      overflow: auto;
    }

    .ledger li {
      padding: 10px 12px;
      border-radius: 12px;
      background: #efe4d1;
      color: #33281f;
      font-size: 13px;
      font-weight: 750;
      line-height: 1.35;
    }

    .rule-card {
      padding: 14px;
      border-radius: 16px;
      background: #251b16;
      color: #f9ecd6;
      line-height: 1.55;
      font-size: 13px;
    }

    .rule-card strong {
      color: var(--brass);
    }

    .burst {
      animation: pulse 320ms ease;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(-18px) rotate(-3deg);
      }
      to {
        opacity: 1;
        transform: translateY(0) rotate(0deg);
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.025); }
    }

    @keyframes chipFly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      65% {
        opacity: 1;
        transform: translate(calc(var(--move-x) * .72), calc(var(--move-y) * .72 - 34px)) scale(.98) rotate(240deg);
      }
      100% {
        opacity: 0;
        transform: translate(var(--move-x), var(--move-y)) scale(.7) rotate(420deg);
      }
    }

    @keyframes stackLand {
      from {
        opacity: 0;
        filter: blur(2px);
        transform:
          translateX(calc((var(--stack-index) - var(--stack-center)) * 18px))
          translateY(-24px)
          rotate(var(--stack-tilt));
      }
      to {
        opacity: 1;
        filter: blur(0);
      }
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .table {
        min-height: 760px;
      }

      .table::before {
        font-size: 72px;
      }

      .topbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .rail {
        margin-bottom: 18px;
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 10px;
      }

      .table {
        border-width: 6px;
        border-radius: 22px;
        padding: 12px;
        min-height: 720px;
      }

      .table::before {
        font-size: 44px;
      }

      .center-callout {
        grid-template-columns: 1fr;
      }

      .dealer-tell {
        width: 100%;
      }

      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card {
        width: 64px;
      }

      .chip {
        width: 112px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="table" aria-label="블랙잭 테이블">
      <div class="topbar">
        <div class="stat"><small>보유금</small><strong id="bankroll">0</strong></div>
        <div class="stat"><small>현재 베팅</small><strong id="current-bet">0</strong></div>
        <div class="stat"><small>연승</small><strong id="streak">0</strong></div>
        <div class="stat"><small>남은 카드</small><strong id="shoe">52</strong></div>
      </div>

      <div class="arena">
        <section class="hand-zone">
          <div class="hand-title">딜러 <span id="dealer-score" class="score-pill">?</span></div>
          <div id="dealer-cards" class="cards"></div>
        </section>

        <section class="center-callout">
          <div class="message" id="message-box">
            <h1 id="message-title">테이블 준비</h1>
            <p id="message-copy">칩을 눌러 베팅을 올리고 시작 버튼을 누르세요.</p>
          </div>
          <aside class="dealer-tell">
            <small>판 읽기</small>
            <strong id="hint">칩을 골라 베팅하세요.</strong>
          </aside>
          <div class="bet-zone" aria-label="베팅 칩 영역">
            <div id="bet-stack" class="bet-stack"></div>
          </div>
        </section>

        <section class="hand-zone">
          <div class="hand-title">플레이어 <span id="player-score" class="score-pill">0</span></div>
          <div id="player-cards" class="cards"></div>
        </section>
      </div>

      <div class="controls">
        <button id="deal" class="action primary">시작</button>
        <button id="hit" class="action blue">한 장 더</button>
        <button id="stand" class="action red">멈추기</button>
        <button id="double" class="action green">두 배</button>
      </div>
    </section>

    <aside class="rail">
      <div class="panel-title">
        <h2>베팅 칩</h2>
        <span id="phase" class="badge">대기</span>
      </div>

      <div class="chips">
        <button class="chip chip-100" data-chip="100"><span>100</span></button>
        <button class="chip chip-500" data-chip="500"><span>500</span></button>
        <button class="chip chip-1000" data-chip="1000"><span>1,000</span></button>
        <button class="chip chip-5000" data-chip="5000"><span>5,000</span></button>
      </div>

      <div class="bet-row">
        <button id="clear-bet" class="soft-button">베팅 취소</button>
        <button id="all-in" class="soft-button">전부 걸기</button>
      </div>

      <div class="rule-card">
        <strong>규칙:</strong> 처음 두 장이 21이면 블랙잭 보너스가 지급됩니다. 딜러는 17 이상에서 멈추고, 두 배는 처음 두 장에서만 가능합니다.
      </div>

      <div class="panel-title">
        <h2>진행 기록</h2>
        <span id="profit" class="badge">+0</span>
      </div>
      <ul id="ledger" class="ledger"></ul>
    </aside>
  </main>

  <script>
    const suits = [
      { key: "spade", symbol: "♠", red: false },
      { key: "heart", symbol: "♥", red: true },
      { key: "diamond", symbol: "♦", red: true },
      { key: "club", symbol: "♣", red: false }
    ];
    const ranks = ["ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "jack", "queen", "king"];
    const rankLabels = {
      ace: "에",
      jack: "잭",
      queen: "퀸",
      king: "킹"
    };
    const phaseLabels = {
      ready: "대기",
      playing: "진행 중",
      settled: "정산 중"
    };
    const state = {
      balance: 50000,
      bet: 0,
      deck: [],
      player: [],
      dealer: [],
      phase: "ready",
      hideDealer: true,
      streak: 0,
      profit: 0,
      doubled: false,
      log: ["디자인 테스트용 블랙잭 테이블입니다."]
    };

    const $ = (id) => document.getElementById(id);
    const money = (value) => Math.floor(value).toLocaleString("ko-KR");
    const rankText = (rank) => rankLabels[rank] || rank;

    function buildDeck() {
      return suits.flatMap((suit) => ranks.map((rank) => ({ ...suit, rank })));
    }

    function shuffle(cards) {
      const next = [...cards];
      for (let i = next.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [next[i], next[j]] = [next[j], next[i]];
      }
      return next;
    }

    function draw() {
      if (state.deck.length < 12) state.deck = shuffle(buildDeck());
      return state.deck.pop();
    }

    function score(hand) {
      let total = 0;
      let aces = 0;
      for (const card of hand) {
        if (card.rank === "ace") {
          total += 11;
          aces += 1;
        } else if (["jack", "queen", "king"].includes(card.rank)) {
          total += 10;
        } else {
          total += Number(card.rank);
        }
      }
      while (total > 21 && aces > 0) {
        total -= 10;
        aces -= 1;
      }
      return { total, soft: aces > 0 };
    }

    function renderCard(card, hidden = false) {
      if (hidden) return `<div class="card back">배금</div>`;
      const color = card.red ? " red" : "";
      const label = rankText(card.rank);
      return `
        <div class="card${color}">
          <div class="rank">${label}</div>
          <div class="suit">${card.symbol}</div>
          <div class="rank mini">${label}</div>
        </div>
      `;
    }

    function chipClass(value) {
      if (value >= 5000) return "chip-5000";
      if (value >= 1000) return "chip-1000";
      if (value >= 500) return "chip-500";
      return "chip-100";
    }

    function chipMarkup(value, extraClass = "stack-chip", style = "") {
      return `<div class="${extraClass} ${chipClass(value)}" ${style}><span>${money(value)}</span></div>`;
    }

    function makeChipPlan(total) {
      const plan = [];
      let remaining = total;
      for (const value of [5000, 1000, 500, 100]) {
        while (remaining >= value && plan.length < 24) {
          plan.push(value);
          remaining -= value;
        }
      }
      if (remaining > 0) plan.push(remaining);
      return plan;
    }

    function renderBetStack() {
      const stack = $("bet-stack");
      if (!state.bet) {
        stack.innerHTML = `<span class="bet-placeholder">칩을 누르면 이곳에 베팅이 쌓입니다.</span>`;
        return;
      }
      const plan = makeChipPlan(state.bet);
      const center = (plan.length - 1) / 2;
      stack.innerHTML = plan.map((value, index) => {
        const tilt = ((index % 5) - 2) * 4;
        const lift = index % 4;
        const style = `style="--stack-index:${index};--stack-center:${center};--stack-tilt:${tilt}deg;--stack-lift:${lift};"`;
        return chipMarkup(value, "stack-chip", style);
      }).join("");
    }

    function render() {
      $("bankroll").textContent = money(state.balance);
      $("current-bet").textContent = money(state.bet);
      $("streak").textContent = state.streak;
      $("shoe").textContent = state.deck.length || 52;
      $("phase").textContent = phaseLabels[state.phase] || state.phase;
      $("profit").textContent = `${state.profit >= 0 ? "+" : ""}${money(state.profit)}`;
      $("dealer-cards").innerHTML = state.dealer.map((card, index) => renderCard(card, state.hideDealer && index === 0)).join("");
      $("player-cards").innerHTML = state.player.map((card) => renderCard(card)).join("");
      renderBetStack();

      const playerScore = score(state.player);
      const dealerScore = score(state.dealer);
      $("player-score").textContent = state.player.length ? playerScore.total : 0;
      $("dealer-score").textContent = state.hideDealer && state.dealer.length ? "?" : dealerScore.total || "?";
      $("hint").textContent = getHint();
      $("ledger").innerHTML = state.log.slice(-8).reverse().map((item) => `<li>${item}</li>`).join("");

      $("deal").disabled = state.phase === "playing" || state.bet <= 0;
      $("hit").disabled = state.phase !== "playing";
      $("stand").disabled = state.phase !== "playing";
      $("double").disabled = state.phase !== "playing" || state.player.length !== 2 || state.balance < state.bet || state.doubled;
      document.querySelectorAll(".chip, #clear-bet, #all-in").forEach((button) => {
        button.disabled = state.phase === "playing";
      });
    }

    function setMessage(title, copy, burst = false) {
      $("message-title").textContent = title;
      $("message-copy").textContent = copy;
      const box = $("message-box");
      box.classList.toggle("burst", burst);
      if (burst) setTimeout(() => box.classList.remove("burst"), 340);
    }

    function addLog(message) {
      state.log.push(message);
      render();
    }

    function getHint() {
      if (state.phase !== "playing") return state.bet ? "시작 준비 완료." : "칩을 골라 베팅하세요.";
      const player = score(state.player).total;
      const upCard = state.dealer[1];
      const dealerValue = upCard ? cardValue(upCard) : 0;
      if (state.player.length === 2 && [10, 11].includes(player)) return "두 배를 노려볼 만한 숫자입니다.";
      if (player <= 11) return "한 장 더 받아도 안전합니다.";
      if (player >= 17) return "여기서 멈추는 쪽이 안정적입니다.";
      if (dealerValue >= 2 && dealerValue <= 6) return "딜러 약한 패. 버스트를 기다려도 됩니다.";
      return "조심스럽게 한 장을 고민할 구간입니다.";
    }

    function cardValue(card) {
      if (card.rank === "ace") return 11;
      if (["jack", "queen", "king"].includes(card.rank)) return 10;
      return Number(card.rank);
    }

    function animateChip(button, amount) {
      const target = $("bet-stack");
      if (!button || !target) return;
      const from = button.getBoundingClientRect();
      const to = target.getBoundingClientRect();
      const startX = from.left + from.width / 2 - 29;
      const startY = from.top + from.height / 2 - 29;
      const endX = to.left + to.width / 2 - 29;
      const endY = to.top + to.height / 2 - 29;
      const chip = document.createElement("div");
      chip.className = `chip-ghost ${chipClass(amount)}`;
      chip.innerHTML = `<span>${money(amount)}</span>`;
      chip.style.left = `${startX}px`;
      chip.style.top = `${startY}px`;
      chip.style.setProperty("--move-x", `${endX - startX}px`);
      chip.style.setProperty("--move-y", `${endY - startY}px`);
      document.body.appendChild(chip);
      chip.addEventListener("animationend", () => chip.remove(), { once: true });
    }

    function setBet(amount, sourceButton) {
      if (state.phase === "playing") return;
      const before = state.bet;
      const next = Math.min(state.balance, state.bet + amount);
      state.bet = next;
      if (state.bet > before) animateChip(sourceButton, amount);
      setMessage("베팅 올림", `${money(state.bet)}원을 테이블에 올렸습니다.`);
      render();
    }

    function clearBet() {
      if (state.phase === "playing") return;
      state.bet = 0;
      setMessage("베팅 취소", "테이블 위 칩을 모두 거두었습니다.");
      render();
    }

    function allIn() {
      if (state.phase === "playing") return;
      state.bet = state.balance;
      setMessage("전부 걸기", "테이블이 잠시 조용해집니다.", true);
      render();
    }

    function deal() {
      if (state.bet <= 0 || state.phase === "playing") return;
      state.balance -= state.bet;
      state.player = [draw(), draw()];
      state.dealer = [draw(), draw()];
      state.hideDealer = true;
      state.doubled = false;
      state.phase = "playing";
      addLog(`${money(state.bet)}원 베팅으로 새 판을 시작했습니다.`);
      setMessage("카드 배분", "처음 두 장이 깔렸습니다.", true);

      const playerBlackjack = score(state.player).total === 21;
      const dealerBlackjack = score(state.dealer).total === 21;
      if (playerBlackjack || dealerBlackjack) settle();
      render();
    }

    function hit() {
      if (state.phase !== "playing") return;
      state.player.push(draw());
      setMessage("한 장 더", "플레이어에게 카드 한 장이 추가되었습니다.", true);
      if (score(state.player).total > 21) settle();
      else addLog("플레이어가 카드를 한 장 받았습니다.");
      render();
    }

    function stand() {
      if (state.phase !== "playing") return;
      state.hideDealer = false;
      setMessage("멈추기", "딜러가 규칙대로 움직입니다.");
      dealerPlay();
      settle();
    }

    function doubleDown() {
      if (state.phase !== "playing" || state.player.length !== 2 || state.balance < state.bet || state.doubled) return;
      state.balance -= state.bet;
      state.bet *= 2;
      state.doubled = true;
      state.player.push(draw());
      state.hideDealer = false;
      setMessage("두 배", "베팅을 두 배로 올리고 마지막 카드 한 장을 받았습니다.", true);
      if (score(state.player).total <= 21) dealerPlay();
      settle();
    }

    function dealerPlay() {
      while (score(state.dealer).total < 17) {
        state.dealer.push(draw());
      }
      state.hideDealer = false;
    }

    function settle() {
      if (state.phase !== "playing") return;
      state.hideDealer = false;
      const player = score(state.player).total;
      const dealer = score(state.dealer).total;
      const natural = state.player.length === 2 && player === 21;
      let payout = 0;
      let title = "패배";
      let copy = "딜러에게 밀렸습니다.";

      if (player > 21) {
        title = "버스트";
        copy = "21을 넘었습니다.";
        state.streak = 0;
      } else if (dealer > 21 || player > dealer) {
        payout = natural ? Math.floor(state.bet * 2.5) : state.bet * 2;
        title = natural ? "블랙잭" : "승리";
        copy = natural ? "처음 두 장으로 21을 만들었습니다." : "딜러보다 높은 점수입니다.";
        state.streak += 1;
      } else if (player === dealer) {
        payout = state.bet;
        title = "무승부";
        copy = "베팅금이 그대로 돌아옵니다.";
      } else {
        state.streak = 0;
      }

      state.balance += payout;
      state.profit += payout - state.bet;
      state.phase = "settled";
      addLog(`${title}: ${copy} (${payout ? "+" + money(payout) : "0"})`);
      setMessage(title, copy, true);
      setTimeout(() => {
        state.phase = "ready";
        state.bet = Math.min(state.bet, state.balance);
        render();
      }, 850);
    }

    document.querySelectorAll(".chip").forEach((button) => {
      button.addEventListener("click", () => setBet(Number(button.dataset.chip), button));
    });
    $("clear-bet").addEventListener("click", clearBet);
    $("all-in").addEventListener("click", allIn);
    $("deal").addEventListener("click", deal);
    $("hit").addEventListener("click", hit);
    $("stand").addEventListener("click", stand);
    $("double").addEventListener("click", doubleDown);

    state.deck = shuffle(buildDeck());
    render();
  </script>
</body>
</html>
