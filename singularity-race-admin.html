<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2310131b'/%3E%3Cpath d='M6 20h20M7 15h18M9 10h14' stroke='%2378db93' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E" />
  <title>특이점레이스 방장 페이지</title>
  <style>
    :root {
      --bg: #111319;
      --panel: #181d22;
      --panel-2: #20242a;
      --line: rgba(255, 255, 255, 0.13);
      --muted: #aeb8bd;
      --text: #f7faf8;
      --green: #7ee08f;
      --cyan: #73d9ee;
      --red: #ff8a9b;
      --yellow: #ffe08a;
      --track: #f4f7f2;
      --wall: #11161c;
      --shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
    }

    button,
    input { font: inherit; }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    h1,
    h2,
    h3,
    p { margin: 0; letter-spacing: 0; }

    h1 { font-size: 24px; line-height: 1.14; }
    h2 { font-size: 17px; line-height: 1.25; }
    h3 { font-size: 14px; line-height: 1.25; }

    p,
    .muted {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .shell {
      width: min(1440px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 16px 0;
      display: grid;
      gap: 12px;
    }

    .topbar,
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
    }

    .top-actions,
    .quick-actions,
    .camera-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .button,
    .top-actions a,
    .room-action {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-weight: 800;
      white-space: nowrap;
    }

    .button.is-primary,
    .top-actions a.is-primary,
    .room-action.is-primary {
      border-color: rgba(126, 224, 143, 0.48);
      background: var(--green);
      color: #07110b;
    }

    .button.is-warn {
      border-color: rgba(255, 224, 138, 0.45);
      color: var(--yellow);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .top-actions a[aria-disabled="true"] {
      pointer-events: none;
      opacity: 0.45;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 260px;
      gap: 12px;
      align-items: stretch;
    }

    .panel { overflow: hidden; }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
    }

    .panel-header p,
    .topbar p,
    .screen-only-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .badge {
      align-self: flex-start;
      padding: 5px 8px;
      border: 1px solid rgba(115, 217, 238, 0.34);
      border-radius: 999px;
      color: var(--cyan);
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .body {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .notice {
      padding: 8px 10px;
      border: 1px solid rgba(255, 224, 138, 0.3);
      border-radius: 8px;
      background: rgba(255, 224, 138, 0.07);
      color: var(--yellow);
      font-size: 12px;
      line-height: 1.45;
    }

    .notice.is-open {
      border-color: rgba(126, 224, 143, 0.38);
      background: rgba(126, 224, 143, 0.08);
      color: var(--green);
    }

    .admin-dialog {
      width: min(420px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .admin-dialog::backdrop {
      background: rgba(0, 0, 0, 0.58);
    }

    .dialog-form {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .dialog-form label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .dialog-form input,
    .dialog-form select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 0 10px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .room-list,
    .runner-list,
    .channel-tabs {
      display: grid;
      gap: 8px;
    }

    .room-card,
    .runner-row,
    .channel-tab {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
    }

    .room-card {
      display: grid;
      gap: 6px;
      padding: 9px;
      text-align: left;
    }

    .room-card.is-active,
    .runner-row[aria-pressed="true"],
    .channel-tab[aria-pressed="true"] {
      border-color: rgba(126, 224, 143, 0.7);
      background: rgba(126, 224, 143, 0.12);
    }

    .room-card.is-closed {
      border-color: rgba(255, 105, 105, 0.42);
      background: rgba(255, 105, 105, 0.08);
      opacity: 0.82;
    }

    .room-card strong,
    .runner-row strong {
      display: block;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .room-meta,
    .runner-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .spectator-policy {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(115, 217, 238, 0.06);
    }

    .spectator-policy-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
    }

    .spectator-policy .muted { display: none; }

    .capacity-options {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    .capacity-option {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
      font-weight: 900;
    }

    .capacity-option.is-active {
      border-color: rgba(126, 224, 143, 0.74);
      background: rgba(126, 224, 143, 0.14);
      color: var(--green);
    }

    .camera-panel {
      display: grid;
      grid-template-rows: auto minmax(420px, 1fr);
    }

    .camera-frame {
      position: relative;
      min-height: 520px;
      overflow: hidden;
      background: #dfe9dd;
    }

    .camera-map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .camera-map svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .track-wall {
      fill: none;
      stroke: var(--wall);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 11;
    }

    .track-road {
      fill: none;
      stroke: var(--track);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 8.6;
    }

    .track-line {
      fill: none;
      stroke: rgba(17, 22, 28, 0.18);
      stroke-dasharray: 1.2 2.8;
      stroke-linecap: round;
      stroke-width: 0.46;
    }

    .save-line,
    .finish-line {
      stroke: #11161c;
      stroke-width: 0.34;
    }

    .save-label {
      fill: #11161c;
      font-size: 3px;
      font-weight: 900;
      paint-order: stroke;
      stroke: #f4f7f2;
      stroke-width: 0.42;
    }

    .runner-marker {
      position: absolute;
      width: 34px;
      height: 42px;
      border: 0;
      background: transparent;
      transform: translate(-50%, -50%);
      transition: left 160ms linear, top 160ms linear;
    }

    .runner-marker img {
      width: 24px;
      height: 24px;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.25));
    }

    .runner-marker span {
      position: absolute;
      left: 50%;
      top: 26px;
      max-width: 64px;
      transform: translateX(-50%);
      overflow: hidden;
      color: #11161c;
      font-size: 10px;
      font-weight: 900;
      text-overflow: ellipsis;
      text-shadow: 0 1px 0 #fff;
      white-space: nowrap;
    }

    .runner-marker.is-selected::before {
      position: absolute;
      inset: -7px 0 1px;
      border: 3px solid rgba(126, 224, 143, 0.9);
      border-radius: 999px;
      content: "";
      filter: drop-shadow(0 0 8px rgba(126, 224, 143, 0.45));
    }

    .camera-window {
      position: absolute;
      width: 150px;
      height: 96px;
      border: 2px solid rgba(255, 138, 155, 0.92);
      border-radius: 8px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 0 0 9999px rgba(17, 19, 25, 0.08);
    }

    .runner-row {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      text-align: left;
    }

    .runner-row img {
      width: 26px;
      height: 26px;
      image-rendering: pixelated;
    }

    .runner-progress {
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .chat-panel {
      display: grid;
      grid-column: 1 / -1;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
    }

    .chat-panel > aside.panel { display: none; }

    .channel-tab {
      min-height: 38px;
      padding: 0 10px;
      text-align: left;
      font-weight: 800;
    }

    .messages {
      display: flex;
      min-height: 220px;
      max-height: 260px;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .message {
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      line-height: 1.45;
    }

    .message.is-admin {
      border-color: rgba(255, 138, 155, 0.42);
      background: rgba(255, 138, 155, 0.08);
    }

    .message.is-system {
      border-color: rgba(255, 224, 138, 0.32);
      background: rgba(255, 224, 138, 0.08);
      color: var(--yellow);
    }

    .message.is-empty {
      color: var(--muted);
      text-align: center;
    }

    .message b {
      display: block;
      margin-bottom: 3px;
      color: var(--cyan);
      font-size: 12px;
    }

    .message span {
      color: var(--text);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .chat-form {
      display: grid;
      grid-template-columns: 1fr 86px;
      gap: 8px;
      padding: 10px 12px 12px;
    }

    .chat-form input {
      min-width: 0;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: 0;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
    }

    .chat-form button {
      min-height: 40px;
      border-radius: 8px;
      background: var(--red);
      color: #101319;
      font-weight: 900;
    }

    @media (max-width: 1120px) {
      .topbar,
      .layout,
      .chat-panel {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .camera-frame {
        min-height: 440px;
      }

    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>특이점레이스 방장</h1>
        <p>방장 조작 화면</p>
      </div>
      <nav class="top-actions" aria-label="빠른 이동">
        <button class="button is-primary" id="admin-create-room-button" type="button">방 만들기</button>
        <a class="is-primary" id="admin-direct-game-link" href="./singularity-race.html?devOnline=1&amp;adminLaunch=1">관리자 직접 보기</a>
        <a id="admin-lobby-link" href="./singularity-race.html?devOnline=1">로비</a>
      </nav>
    </header>

    <section class="layout">
      <aside class="panel">
        <div class="panel-header">
          <div>
            <h2>방 관리</h2>
            <p>방 관리</p>
          </div>
          <span class="badge">방장</span>
        </div>
        <div class="body">
          <div class="notice" id="admin-gate">개발 방을 여는 중입니다.</div>
          <div class="room-list" id="room-list" aria-label="방 목록"></div>
          <div class="spectator-policy" aria-label="관전자 정원">
            <div class="spectator-policy-head">
              <span>관전자</span>
              <span id="spectator-capacity-label">0 / 32명</span>
            </div>
            <div class="capacity-options" id="spectator-capacity-options"></div>
            <p class="muted" id="spectator-policy-note">관전자 정원</p>
          </div>
          <div class="quick-actions" aria-label="방장 조작">
            <button class="button is-primary" id="admin-start-button" type="button">시작</button>
            <button class="button" id="admin-add-bots-button" type="button">봇 넣기</button>
            <button class="button" id="admin-clear-bots-button" type="button">봇 비우기</button>
            <button class="button" id="admin-room-settings-button" type="button">방 설정</button>
            <button class="button is-warn" id="admin-delete-room-button" type="button">방 종료</button>
            <button class="button is-warn" id="admin-remove-room-button" type="button">방 삭제</button>
            <button class="button is-warn" id="camera-all-button" type="button">전체 보기</button>
            <button class="button" id="admin-observer-button" type="button">옵저버 참석</button>
          </div>
          <p class="muted" id="admin-start-status">대기 중</p>
        </div>
      </aside>

      <section class="panel camera-panel">
        <div class="panel-header">
          <div>
            <h2>전체 맵</h2>
            <p id="camera-title">전체 코스를 보고 있습니다.</p>
          </div>
          <span class="badge">보기</span>
        </div>
        <div class="camera-frame" id="host-camera" aria-label="방장 미리보기 카메라">
          <div class="camera-map">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-label="마라톤 전체 맵">
              <path class="track-wall" id="track-wall" d="" />
              <path class="track-road" id="track-road" d="" />
              <path class="track-line" id="track-line" d="" />
              <line class="finish-line" id="finish-line" x1="0" y1="0" x2="0" y2="0" />
              <g id="save-points"></g>
            </svg>
          </div>
          <div class="camera-window" id="camera-window" hidden></div>
          <div id="runner-markers"></div>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-header">
          <div>
            <h2>선수</h2>
            <p>선수 목록</p>
          </div>
          <span class="badge" id="runner-count-badge">0명</span>
        </div>
        <div class="body runner-list" id="runner-watch-list" aria-label="플레이어 보기"></div>
      </aside>

      <section class="chat-panel">
        <aside class="panel">
          <div class="panel-header">
            <div>
              <h2>채널</h2>
              <p>방장 채널과 공개 채널을 분리합니다.</p>
            </div>
          </div>
          <div class="body channel-tabs" id="channel-tabs" aria-label="채팅 채널"></div>
        </aside>

        <section class="panel">
          <div class="panel-header">
            <div>
              <h2 id="chat-title">채팅</h2>
              <p id="chat-channel">채팅</p>
            </div>
            <span class="badge">방장</span>
          </div>
          <div class="messages" id="messages" aria-live="polite"></div>
          <form class="chat-form" id="chat-form">
            <input id="chat-input" maxlength="160" autocomplete="off" placeholder="메시지 입력" />
            <button type="submit">전송</button>
          </form>
        </section>
      </section>
    </section>

    <dialog class="admin-dialog" id="room-dialog">
      <form class="dialog-form" id="room-form" method="dialog">
        <h2 id="room-dialog-title">방 만들기</h2>
        <label>
          방 이름
          <input id="room-name-input" maxlength="32" autocomplete="off" placeholder="특이점 스타디움 001" />
        </label>
        <label>
          관전자 정원
          <select id="room-spectator-input">
            <option value="10">10명</option>
            <option value="32" selected>32명</option>
            <option value="50">50명</option>
            <option value="80">80명</option>
          </select>
        </label>
        <label>
          테스트 봇 수
          <input id="room-bot-input" type="number" min="0" max="50" step="1" value="0" />
        </label>
        <div class="dialog-actions">
          <button class="button" id="room-cancel-button" type="button">취소</button>
          <button class="button is-primary" id="room-save-button" type="submit">저장</button>
        </div>
      </form>
    </dialog>

    <dialog class="admin-dialog" id="room-delete-dialog">
      <form class="dialog-form" id="room-delete-form" method="dialog">
        <h2>방 종료</h2>
        <p class="muted" id="room-delete-copy">선택한 방을 종료하고 재입장을 막습니다.</p>
        <div class="dialog-actions">
          <button class="button" id="room-delete-cancel-button" type="button">취소</button>
          <button class="button is-warn" id="room-delete-confirm-button" type="submit">종료</button>
        </div>
      </form>
    </dialog>

    <dialog class="admin-dialog" id="room-remove-dialog">
      <form class="dialog-form" id="room-remove-form" method="dialog">
        <h2>방 삭제</h2>
        <p class="muted" id="room-remove-copy">선택한 방을 목록과 로컬 기록에서 삭제합니다.</p>
        <div class="dialog-actions">
          <button class="button" id="room-remove-cancel-button" type="button">취소</button>
          <button class="button is-warn" id="room-remove-confirm-button" type="submit">삭제</button>
        </div>
      </form>
    </dialog>
  </main>

  <script type="module">
    import {
      canOpenConnectedMarathonLobby,
      createMarathonRoomAdapterForMode,
      getConnectedMarathonRoomSummaries,
      validateRestoredMarathonRoomAdapter
    } from "./src/restored/online/marathon-room-adapter.js";
    import {
      listRestoredMarathonSpectatorCapOptions,
      readRestoredMarathonRoomPolicy,
      writeRestoredMarathonRoomPolicy
    } from "./src/restored/online/marathon-room-policy.js";
    import {
      closeRestoredMarathonDevRoom,
      createRestoredMarathonDevRoomId,
      createRestoredMarathonDevRoomRecord,
      deleteRestoredMarathonDevRoom,
      readRestoredMarathonDevRooms,
      upsertRestoredMarathonDevRoom
    } from "./src/restored/online/marathon-dev-room-registry.js";
    import {
      createInitialRestoredMarathonChannelMessages,
      createRestoredMarathonChannelSet,
      filterVisibleRestoredMarathonChannels,
      findRestoredMarathonChannel
    } from "./src/restored/online/marathon-channel-adapter.js";
    import {
      createRestoredMarathonDevChatTransport
    } from "./src/restored/online/marathon-dev-chat-transport.js";
    import {
      createRestoredMarathonDevChatStorageKey
    } from "./src/restored/online/marathon-dev-chat-storage.js";
    import {
      createRestoredMarathonDevRoomTransport
    } from "./src/restored/online/marathon-dev-room-transport.js";
    import {
      RESTORED_MARATHON_WORLD_HEIGHT,
      RESTORED_MARATHON_WORLD_WIDTH,
      createRestoredMarathonTrailSvgPath,
      listRestoredMarathonTrailSavePoints,
      progressToRestoredMarathonTrailPoint,
      progressToRestoredMarathonMapPoint
    } from "./src/restored/games/marathon-trail-geometry.js";
    import {
      RESTORED_MARATHON_MAX_RUNNERS
    } from "./src/restored/games/marathon-contract.js";
    import {
      getPlayableSkinPresets,
      getPresetSkinDataUrl
    } from "./src/skins/drawing-world-adapter.js";
    import {

    const MAX_RUNNERS = RESTORED_MARATHON_MAX_RUNNERS;

    const activeRoomClosed = activeDevRoom?.phase === "closed" || rooms[0]?.phase === "abandoned";
    const connected = adapterValidation.ok && canOpenConnectedMarathonLobby(adapter) && !activeRoomClosed;
    const roomPolicy = readRestoredMarathonRoomPolicy(window.localStorage, activeRoomId, initialRoomPolicy);
    const channels = adapter.channels?.length ? adapter.channels : createRestoredMarathonChannelSet({ roomId: activeRoomId });
    const visibleChannels = filterVisibleRestoredMarathonChannels(channels, connected ? "admin" : "spectator")

    const roomPacketTransport = connected ? createRestoredMarathonDevRoomTransport({

    const chatTransport = createRestoredMarathonDevChatTransport({

      clock: () => Date.now(),

    });
    const skinPresets = getPlayableSkinPresets();
    const raceControlBroadcast = openSingularityRaceControlBroadcast(window);
    const elements = {
      gate: document.querySelector("#admin-gate"),
      roomList: document.querySelector("#room-list"),
      spectatorCapacityLabel: document.querySelector("#spectator-capacity-label"),
      spectatorCapacityOptions: document.querySelector("#spectator-capacity-options"),

      createRoomButton: document.querySelector("#admin-create-room-button"),
      directGameLink: document.querySelector("#admin-direct-game-link"),
      lobbyLink: document.querySelector("#admin-lobby-link"),
      startButton: document.querySelector("#admin-start-button"),
      addBotsButton: document.querySelector("#admin-add-bots-button"),
      clearBotsButton: document.querySelector("#admin-clear-bots-button"),

      deleteRoomButton: document.querySelector("#admin-delete-room-button"),
      removeRoomButton: document.querySelector("#admin-remove-room-button"),
      observerButton: document.querySelector("#admin-observer-button"),
      startStatus: document.querySelector("#admin-start-status"),
      cameraAll: document.querySelector("#camera-all-button"),
      cameraTitle: document.querySelector("#camera-title"),
      cameraWindow: document.querySelector("#camera-window"),

      runnerList: document.querySelector("#runner-watch-list"),
      runnerCountBadge: document.querySelector("#runner-count-badge"),
      savePoints: document.querySelector("#save-points"),

      roomDialogTitle: document.querySelector("#room-dialog-title"),
      roomNameInput: document.querySelector("#room-name-input"),
      roomSpectatorInput: document.querySelector("#room-spectator-input"),

      roomDeleteDialog: document.querySelector("#room-delete-dialog"),
      roomDeleteForm: document.querySelector("#room-delete-form"),
      roomDeleteCopy: document.querySelector("#room-delete-copy"),
      roomDeleteCancelButton: document.querySelector("#room-delete-cancel-button"),
      roomRemoveDialog: document.querySelector("#room-remove-dialog"),

    };
    const state = {

        channelId: state.activeChannel,
        senderId: "admin:host",
        senderType: "admin",
        displayName: "방장",
        text
      });
      if (result.ok) {
        state.messages = result.messages;
        elements.input.value = "";
      }
      render();
    });

    chatTransport.subscribe((messages) => {
      state.messages = messages;

      refreshRunners();

    });

    function setupMap() {
      const path = createRestoredMarathonTrailSvgPath();
      elements.trackWall.setAttribute("d", path);
      elements.trackRoad.setAttribute("d", path);
      elements.trackLine.setAttribute("d", path);
      const finishLine = trailMarkerLine(progressToRestoredMarathonTrailPoint(100), 4.4);
      for (const [key, value] of Object.entries(finishLine)) elements.finishLine.setAttribute(key, value);
      elements.savePoints.replaceChildren(...listRestoredMarathonTrailSavePoints().map((point) => {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        line.setAttribute("class", "save-line");
        line.setAttribute("x1", point.tick.x1);
        line.setAttribute("y1", point.tick.y1);
        line.setAttribute("x2", point.tick.x2);
        line.setAttribute("y2", point.tick.y2);
        label.setAttribute("class", "save-label");
        label.setAttribute("x", point.x - 1.2);
        label.setAttribute("y", point.y - 3.2);
        label.textContent = String(point.index);
        group.append(line, label);
        return group;
      }));
    }

    function trailMarkerLine(point, half = 3.8) {
      return {
        x1: Math.max(2, Math.min(98, point.x - (point.normal?.x || 0) * half)),
        y1: Math.max(2, Math.min(98, point.y - (point.normal?.y || 1) * half)),
        x2: Math.max(2, Math.min(98, point.x + (point.normal?.x || 0) * half)),
        y2: Math.max(2, Math.min(98, point.y + (point.normal?.y || 1) * half))
      };
    }

    function render() {
      renderGate();
      renderRooms();
      renderSpectatorPolicy();
      renderCamera();
      renderRunnerList();
      renderChannelTabs();
      renderMessages();
    }

    function openRoomDialog(mode) {
      const creating = mode === "create" || !activeDevRoom;
      elements.roomDialog.dataset.mode = creating ? "create" : "settings";
      elements.roomDialogTitle.textContent = creating ? "방 만들기" : "방 설정";
      elements.roomNameInput.value = creating ? `특이점 스타디움 ${String(devRooms.length + 1).padStart(3, "0")}` : activeDevRoom.displayName;
      elements.roomSpectatorInput.value = String(creating ? 32 : activeDevRoom.maxSpectators);
      elements.roomBotInput.value = String(readTestBotControl()?.botCount || 0);
      openDialog(elements.roomDialog);
      elements.roomNameInput.focus();
      elements.roomNameInput.select();
    }

    function saveRoomFromDialog() {
      const now = Date.now();
      const creating = elements.roomDialog.dataset.mode === "create" || !activeDevRoom;
      const roomId = creating ? createNextRoomId() : activeDevRoom.roomId;
      const room = createRestoredMarathonDevRoomRecord({
        ...(creating ? {} : activeDevRoom),
        roomId,
        displayName: elements.roomNameInput.value,
        maxRunners: MAX_RUNNERS,
        maxSpectators: Number(elements.roomSpectatorInput.value),
        createdAtMs: creating ? now : activeDevRoom.createdAtMs,
        updatedAtMs: now
      });
      upsertRestoredMarathonDevRoom(window.localStorage, room);
      window.localStorage.setItem(ADMIN_SELECTED_ROOM_STORAGE_KEY, room.roomId);
      if (creating) {
        clearStoredRoomPackets(room.roomId);
        clearStoredRoomChat(room.roomId);
        clearStoredRoomControls(room.roomId);
      }
      writeRestoredMarathonRoomPolicy(window.localStorage, {
        roomId: room.roomId,
        maxSpectators: room.maxSpectators,
        spectatorMidJoin: true
      });
      const botCount = Math.max(0, Math.min(MAX_RUNNERS, Math.round(Number(elements.roomBotInput.value) || 0)));
      if (botCount > 0) {
        const command = createSingularityRaceTestBotsCommand({
          nowMs: now,
          roomId: room.roomId,
          sourceClientId: "client:singularity-race-host",
          botCount
        });
        writeSingularityRaceTestBotsCommand(window.localStorage, command);
        publishSingularityRaceControlCommand(raceControlBroadcast, command);
      }
      elements.roomDialog.close();
      window.location.reload();
    }

    function closeActiveRoom() {
      if (!activeDevRoom) return;
      const now = Date.now();
      closeRestoredMarathonDevRoom(window.localStorage, activeDevRoom.roomId, { closedAtMs: now });
      window.localStorage.setItem(ADMIN_SELECTED_ROOM_STORAGE_KEY, activeDevRoom.roomId);
      clearStoredRoomPackets(activeDevRoom.roomId);
      if (roomPacketTransport) roomPacketTransport.savePackets([], { reason: "room_closed" });
      const closeCommand = createSingularityRaceRoomClosedCommand({
        nowMs: now,
        roomId: activeDevRoom.roomId,
        sourceClientId: "client:singularity-race-host"
      });
      writeSingularityRaceControlCommand(window.localStorage, closeCommand);
      publishSingularityRaceControlCommand(raceControlBroadcast, closeCommand);
      const botCommand = createSingularityRaceTestBotsCommand({
        nowMs: now,
        roomId: activeDevRoom.roomId,
        sourceClientId: "client:singularity-race-host",
        botCount: 0
      });
      writeSingularityRaceTestBotsCommand(window.localStorage, botCommand);
      publishSingularityRaceControlCommand(raceControlBroadcast, botCommand);
      elements.roomDeleteDialog.close();
      window.location.reload();
    }

    function removeActiveRoom() {
      if (!activeDevRoom) return;
      const now = Date.now();
      const closeCommand = createSingularityRaceRoomClosedCommand({
        nowMs: now,
        roomId: activeDevRoom.roomId,
        sourceClientId: "client:singularity-race-host",
        reason: "host_deleted_room"
      });
      writeSingularityRaceControlCommand(window.localStorage, closeCommand);
      publishSingularityRaceControlCommand(raceControlBroadcast, closeCommand);
      const remainingRooms = deleteRestoredMarathonDevRoom(window.localStorage, activeDevRoom.roomId);
      clearStoredRoomPackets(activeDevRoom.roomId);
      clearStoredRoomChat(activeDevRoom.roomId);
      clearStoredRoomControls(activeDevRoom.roomId);
      if (roomPacketTransport) roomPacketTransport.savePackets([], { reason: "room_deleted" });
      const nextRoom = remainingRooms.find((room) => room.phase !== "closed") || remainingRooms[0] || null;
      if (nextRoom) window.localStorage.setItem(ADMIN_SELECTED_ROOM_STORAGE_KEY, nextRoom.roomId);
      else window.localStorage.removeItem(ADMIN_SELECTED_ROOM_STORAGE_KEY);
      elements.roomRemoveDialog.close();
      window.location.reload();

    function clearStoredRoomPackets(roomId) {
      createRestoredMarathonDevRoomTransport({
        roomId,
        storage: window.localStorage,
        clock: () => Date.now(),
        packetLimit: 80
      }).savePackets([], { reason: "reset_room_packets" });
    }

    function clearStoredRoomChat(roomId) {
      window.localStorage.removeItem(createRestoredMarathonDevChatStorageKey(roomId));
    }

    function clearStoredRoomControls(roomId) {
      window.localStorage.removeItem(createSingularityRaceControlStorageKey(roomId));
      window.localStorage.removeItem(createSingularityRaceTestBotsStorageKey(roomId));
    }

    function createNextRoomId() {
      const used = new Set(devRooms.map((room) => room.roomId));
      for (let index = 1; index <= 999; index += 1) {
        const roomId = createRestoredMarathonDevRoomId(index);
        if (!used.has(roomId)) return roomId;
      }
      return createRestoredMarathonDevRoomId(devRooms.length + 1);
    }

    function openDialog(dialog) {
      if (typeof dialog.showModal === "function") {

      dialog.setAttribute("open", "");

    function renderGate() {
      elements.gate.textContent = connected
        ? "방 열림"
        : (devOnlineEnabled ? "생성된 방 없음" : "개발 모드 꺼짐");
      if (activeRoomClosed) elements.gate.textContent = "방 종료됨";
      elements.gate.classList.toggle("is-open", connected && !activeRoomClosed);
      elements.createRoomButton.disabled = !devOnlineEnabled;
      elements.directGameLink.setAttribute("aria-disabled", String(!connected || activeRoomClosed));

      elements.lobbyLink.setAttribute("aria-disabled", String(!connected || activeRoomClosed));
      elements.lobbyLink.href = connected && !activeRoomClosed ? createPlayerRoomHref(activeRoomId) : "./singularity-race.html?devOnline=1";

      elements.addBotsButton.disabled = !connected;

    function renderRooms() {
      if (!rooms.length) {
        const empty = document.createElement("div");

      const roomCards = rooms.map((room) => {
        const row = document.createElement("div");
        const roomClosed = room.phase === "abandoned";
        row.className = `room-card${room.roomId === activeRoomId ? " is-active" : ""}${roomClosed ? " is-closed" : ""}`;
        row.dataset.roomId = room.roomId;
        row.addEventListener("click", (event) => {
          if (event.target.closest("a")) return;
          window.localStorage.setItem(ADMIN_SELECTED_ROOM_STORAGE_KEY, room.roomId);

        });
        const title = document.createElement("strong");
        title.textContent = roomDisplayName(room);
        const meta = document.createElement("div");
        meta.className = "room-meta";
        const maxSpectators = state.roomPolicy.maxSpectators;
        const visibleRunners = state.runners.length;
        meta.innerHTML = `<span>선수 ${visibleRunners}/${room.maxPlayers || MAX_RUNNERS}</span><span>관전자 ${room.spectators || 0}/${maxSpectators}</span>`;
        if (roomClosed) meta.innerHTML = `<span>종료됨</span><span>재입장 불가</span>`;
        const action = document.createElement("a");
        action.className = "room-action is-primary";
        action.href = roomClosed ? "#" : createPlayerRoomHref(room.roomId);
        action.setAttribute("aria-disabled", String(roomClosed));
        action.textContent = "로비";
        if (roomClosed) action.textContent = "종료됨";
        row.append(title, meta, action);
        return row;
      });
      elements.roomList.replaceChildren(...roomCards);

    function roomDisplayName(room) {

      });

        adminLaunch: "1",
        adminObserver: "1",
        roomId
      });
      return `./singularity-race.html?${params.toString()}`;

    function renderSpectatorPolicy() {
      const room = rooms[0] || {};
      const spectatorCount = room.spectators || 0;
      elements.spectatorCapacityLabel.textContent = `${spectatorCount} / ${state.roomPolicy.maxSpectators}명`;
      elements.spectatorPolicyNote.textContent = connected ? "" : "방을 먼저 만들어야 합니다.";
      elements.spectatorCapacityOptions.replaceChildren(...listRestoredMarathonSpectatorCapOptions().map((cap) => {
        const button = document.createElement("button");
        button.className = `capacity-option${cap === state.roomPolicy.maxSpectators ? " is-active" : ""}`;
        button.type = "button";
        button.disabled = !connected;
        button.dataset.spectatorCap = String(cap);
        button.textContent = cap === 0 ? "닫기" : `${cap}명`;
        return button;
      }));
    }

    function refreshRunners() {
      state.packets = roomPacketTransport ? roomPacketTransport.loadPackets([]) : [];
      const snapshot = [...state.packets].reverse().find((packet) => packet.type === "state_snapshot");
      const botTargetCount = readTestBotControl()?.botCount || 0;
      const participants = (Array.isArray(snapshot?.payload?.participants) ? snapshot.payload.participants : [])
        .filter((participant) => shouldShowAdminParticipant(participant, botTargetCount));
      const seeded = participants.map((participant, index) => createRunnerFromParticipant(participant, index));
      state.runners = fillRunnerPreviewPack(seeded, botTargetCount);
      if (state.selectedRunnerId && !state.runners.some((runner) => runner.id === state.selectedRunnerId)) state.selectedRunnerId = "";
    }

    function shouldShowAdminParticipant(participant, botTargetCount) {
      const participantId = String(participant?.participantId || "");
      if (participantId.startsWith("runner:bot-")) return botTargetCount > 0;
      const type = participant?.type || (participantId.startsWith("runner:bot-") ? "bot" : participantId.startsWith("runner:") ? "player" : "");
      if (type === "bot") return botTargetCount > 0;
      return type === "player";
    }

    function createRunnerFromParticipant(participant, index) {
      const progress = participant.progressMeters ? Math.max(0, Math.min(100, participant.progressMeters / COURSE_METERS * 100)) : 4 + index * 0.12;
      return {
        id: participant.participantId || `runner:${index + 1}`,
        name: participant.displayName || `선수 ${index + 1}`,
        progress,
        laneOffsetPx: resolveAdminRunnerLaneOffsetPx(participant, index),
        status: participant.finishedAtMs ? "완주" : "대기",
        skinId: skinPresets[index % skinPresets.length]?.id || "default"
      };
    }

    function fillRunnerPreviewPack(seed, targetCount = 0) {
      const runners = [...seed];
      const names = ["나", "하늘", "보리", "초코", "모찌", "루미", "궤도", "픽셀", "대시", "민트", "젤리", "연", "물결", "햇살", "네온", "사이다", "구름", "베리", "스파크", "푸딩", "망고", "비스킷", "점이", "루비", "클로버", "자두", "토스트", "태피", "코코", "유자"];
      const clockDrift = ((Date.now() / 1000) % 20) * 0.05;
      const count = Math.max(0, Math.min(MAX_RUNNERS, Math.round(Number(targetCount) || 0)));
      for (let index = runners.length; index < count; index += 1) {
        runners.push({
          id: `preview:${index + 1}`,
          name: names[index] || `선수 ${index + 1}`,
          progress: Math.min(96, 3.4 + (index % 15) * 0.18 + Math.floor(index / 15) * 1.2 + clockDrift),
          laneOffsetPx: clampNumber(((index % 10) - 4.5) * 42, -ROAD_LANE_HALF_WIDTH_PX, ROAD_LANE_HALF_WIDTH_PX),
          status: connected ? "대기" : "미리보기",
          skinId: skinPresets[index % skinPresets.length]?.id || "default"
        });
      }
      return runners;
    }

    function renderCamera() {
      const selected = getSelectedRunner();
      elements.runnerMarkers.replaceChildren(...state.runners.map((runner) => {
        const marker = document.createElement("button");
        const point = runnerToMapPoint(runner);
        marker.className = `runner-marker${runner.id === selected?.id ? " is-selected" : ""}`;
        marker.type = "button";
        marker.style.left = `${point.x}%`;
        marker.style.top = `${point.y}%`;
        marker.title = runner.name;
        marker.addEventListener("click", () => {
          state.selectedRunnerId = runner.id;
          render();
        });
        const img = document.createElement("img");
        img.alt = `${runner.name} 스킨`;
        img.src = getPresetSkinDataUrl(runner.skinId, "side");
        const name = document.createElement("span");
        name.textContent = runner.name;
        marker.append(img, name);
        return marker;
      }));
      elements.cameraWindow.hidden = !selected;
      if (selected) {
        const point = runnerToMapPoint(selected);
        elements.cameraWindow.style.left = `${point.x}%`;
        elements.cameraWindow.style.top = `${point.y}%`;
        elements.cameraTitle.textContent = `${selected.name} 보기`;
      } else {
        elements.cameraTitle.textContent = "전체 맵";
      }
    }

    function renderRunnerList() {
      elements.runnerCountBadge.textContent = `${state.runners.length}명`;
      if (!state.runners.length) {
        const empty = document.createElement("div");
        empty.className = "message is-empty";
        empty.textContent = "선수가 없습니다.";
        elements.runnerList.replaceChildren(empty);
        return;
      }
      elements.runnerList.replaceChildren(...state.runners.map((runner) => {
        const row = document.createElement("button");
        row.className = "runner-row";
        row.type = "button";
        row.setAttribute("aria-pressed", String(runner.id === state.selectedRunnerId));
        row.addEventListener("click", () => {
          state.selectedRunnerId = runner.id;
          render();
        });
        const img = document.createElement("img");
        img.alt = `${runner.name} 스킨`;
        img.src = getPresetSkinDataUrl(runner.skinId, "side");
        const info = document.createElement("div");
        const name = document.createElement("strong");
        name.textContent = runner.name;
        const meta = document.createElement("div");
        meta.className = "runner-meta";
        meta.textContent = runner.status;
        info.append(name, meta);
        const progress = document.createElement("div");
        progress.className = "runner-progress";
        progress.textContent = `${Math.round(runner.progress)}%`;
        row.append(img, info, progress);
        return row;
      }));
    }

    function renderChannelTabs() {
      elements.channelTabs.replaceChildren(...visibleChannels.map((channel) => {
        const button = document.createElement("button");
        button.className = "channel-tab";
        button.type = "button";
        button.textContent = channelLabel(channel);
        button.setAttribute("aria-pressed", String(channel.channelId === state.activeChannel));
        button.addEventListener("click", () => {
          state.activeChannel = channel.channelId;
          render();
        });
        return button;
      }));
      const channel = findRestoredMarathonChannel(channels, state.activeChannel);
      elements.chatTitle.textContent = "채팅";
      elements.chatChannel.textContent = channelLabel(channel);
    }

    function renderMessages() {
      const rows = state.messages
        .filter((message) => message.channelId === state.activeChannel)
        .filter((message) => message.senderType !== "system" && message.type !== "system")
        .slice(-60);
      if (!rows.length) {
        const empty = document.createElement("div");
        empty.className = "message is-empty";
        empty.textContent = "아직 메시지가 없습니다.";
        elements.messages.replaceChildren(empty);
        return;
      }
      elements.messages.replaceChildren(...rows.map((message) => {
        const row = document.createElement("div");
        row.className = `message${message.senderType === "admin" ? " is-admin" : ""}${message.senderType === "system" ? " is-system" : ""}`;
        const author = document.createElement("b");
        author.textContent = senderName(message);
        const text = document.createElement("span");
        text.textContent = messageText(message);
        row.append(author, text);
        return row;
      }));
      elements.messages.scrollTop = elements.messages.scrollHeight;
    }

    function messageText(message) {
      return ({
        "Singularity Race lobby channel is ready.": "특이점레이스 로비 채널이 준비되었습니다.",
        "Spectator channel is ready for public viewing.": "관전자 채널이 열렸습니다.",
        "Admin channel is dev-only until real server auth exists.": "방장 채널은 실제 서버 인증 전까지 개발 전용입니다.",
        "Admin direct game launch joined DEV room.": "방장 페이지에서 개발 방에 바로 입장했습니다.",
        "DEV connected room joined after join_result ok.": "개발 연결 방 입장이 확인되었습니다.",
        "Gate locked. Attacks open after admin countdown.": "아직 출발 전입니다. 방장 시작 후 공격할 수 있습니다.",
        "Gate locked. Skills open after admin countdown.": "아직 출발 전입니다. 방장 시작 후 스킬을 사용할 수 있습니다."
      })[message.text] || message.text;
    }

    function senderName(message) {
      if (message.senderType === "system" || message.displayName === "SYSTEM") return "시스템";
      return message.displayName || senderLabel(message.senderType);
    }

    function publishRaceStartControl() {
      const now = Date.now();
      const command = createSingularityRaceStartCountdownCommand({
        nowMs: now,
        roomId: activeRoomId,
        sourceClientId: "client:singularity-race-host"
      });
      writeSingularityRaceControlCommand(window.localStorage, command);
      publishSingularityRaceControlCommand(raceControlBroadcast, command);
      elements.startStatus.textContent = "카운트다운 시작";
      render();
    }

    function publishTestBotControl(botCount) {
      const command = createSingularityRaceTestBotsCommand({
        nowMs: Date.now(),
        roomId: activeRoomId,
        sourceClientId: "client:singularity-race-host",
        botCount
      });
      writeSingularityRaceTestBotsCommand(window.localStorage, command);
      publishSingularityRaceControlCommand(raceControlBroadcast, command);
      if (botCount <= 0) roomPacketTransport?.savePackets([], { reason: "clear_test_bots" });
      refreshRunners();
      elements.startStatus.textContent = botCount > 0
        ? `봇 ${botCount}명`
        : "봇 없음";
      render();
    }

    function runnerToMapPoint(runner) {
      const laneOffsetPx = clampNumber(Number(runner.laneOffsetPx) || 0, -ROAD_LANE_HALF_WIDTH_PX, ROAD_LANE_HALF_WIDTH_PX);
      return progressToRestoredMarathonMapPoint(runner.progress, {
        laneOffsetPx,
        laneHalfWidthPx: ROAD_LANE_HALF_WIDTH_PX,
        worldWidth: TRACK_WORLD_WIDTH,
        worldHeight: TRACK_WORLD_HEIGHT,
        minPercent: 2,
        maxPercent: 98
      });
    }

    function resolveAdminRunnerLaneOffsetPx(participant, index) {
      if (Number.isFinite(Number(participant?.laneOffsetPx))) {
        return clampNumber(Number(participant.laneOffsetPx), -ROAD_LANE_HALF_WIDTH_PX, ROAD_LANE_HALF_WIDTH_PX);
      }
      return clampNumber(((index % 6) - 2.5) * 64, -ROAD_LANE_HALF_WIDTH_PX, ROAD_LANE_HALF_WIDTH_PX);
    }

    function clampNumber(value, min, max) {
      const number = Number.isFinite(Number(value)) ? Number(value) : min;
      return Math.max(min, Math.min(max, number));
    }

    function getSelectedRunner() {
      return state.runners.find((runner) => runner.id === state.selectedRunnerId) || null;
    }

    function readTestBotControl() {
      return readSingularityRaceTestBotsCommand(window.localStorage, activeRoomId);
    }

    function channelLabel(channel) {
      if (!channel) return "채팅";
      return ({
        lobby: "로비",
        room: "레이스",
        spectator: "관전자",
        admin: "방장",
        system: "공지"
      })[channel.type] || channel.label || "채팅";
    }

    function senderLabel(type) {
      return ({ admin: "방장", system: "시스템", spectator: "관전자", player: "플레이어" })[type] || "사용자";
    }

  </script>
</body>
</html>
